spring.application.name=demo
# Dynamic connection string pointing to MySQL (defaults to localhost if running in IDE)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/productdb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=your_mysql_password_here

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
